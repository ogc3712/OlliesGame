<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#10150d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="random geame">
<title>random geame</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./bloodroot-icon.svg" type="image/svg+xml">
<style>
:root{
  --font-pixel:"Press Start 2P","Courier New",Consolas,monospace;
  --font-book:"Press Start 2P","Courier New",Consolas,monospace;
  --cooldown-orb-size:94px;
  --ink:#17110d;
  --paper:#d6c09a;
  --paper-dark:#8b714e;
  --moss:#556b35;
  --moss-bright:#8da858;
  --stone:#546055;
  --line:rgba(240,226,190,.2);
  --text:#efe2c4;
  --muted:#b9a98c;
  --blood:#8f1f24;
  --gold:#d6ad55;
  --ember:#d75c35;
  --violet:#6f3fc8;
  --pixel-outline:
    2px 0 #17110d,
    -2px 0 #17110d,
    0 2px #17110d,
    0 -2px #17110d,
    2px 2px #000;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#090c08;
  color:var(--text);
  font-family:var(--font-pixel);
  font-smooth:never;
  -webkit-font-smoothing:none;
  text-rendering:geometricPrecision;
  touch-action:none;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:linear-gradient(rgba(255,255,255,.025) 50%,rgba(0,0,0,0) 50%);
  background-size:100% 4px;
  mix-blend-mode:screen;
  opacity:.2;
  z-index:5;
}
#app{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 8%,rgba(83,98,68,.34),transparent 42%),
    linear-gradient(180deg,#12190f,#070a07 68%,#050605);
}
#game{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  border:none;
  background:#0c100b;
  box-shadow:0 0 0 2px rgba(0,0,0,.7) inset;
  cursor:crosshair;
}
body.pointerLocked,
body.pointerLocked #game{
  cursor:none;
}
#hud,#overlay,#touchLayer,#rotateOverlay{
  position:fixed;
  inset:0;
  pointer-events:none;
}
body:not(.gameActive) #hud,
body:not(.gameActive) #touchLayer{
  display:none;
}
body.cinematicActive #hud,
body.cinematicActive #touchLayer{
  opacity:0;
  pointer-events:none;
}
body.cinematicActive,
body.cinematicActive #app,
body.cinematicActive #game{
  background:#010101;
}
body.cinematicActive #game{
  box-shadow:none;
}
body.cinematicActive::before{
  opacity:0;
}
#hudTop{
  position:absolute;
  left:14px;
  right:14px;
  top:12px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
}
.journalPanel{
  pointer-events:auto;
  background:
    linear-gradient(180deg,rgba(42,34,22,.93),rgba(19,15,11,.92)),
    repeating-linear-gradient(90deg,rgba(214,192,154,.08) 0 2px,transparent 2px 8px);
  border:3px solid #17110d;
  border-radius:0;
  box-shadow:
    0 0 0 2px rgba(214,192,154,.24),
    0 0 0 5px rgba(17,12,8,.78),
    0 12px 34px rgba(0,0,0,.36),
    inset 0 0 0 2px rgba(120,94,52,.55);
  image-rendering:pixelated;
}
#vitals{
  width:min(42vw,440px);
  padding:12px 14px;
  flex:0 1 440px;
}
.bar{
  position:relative;
  height:18px;
  border:3px solid #17110d;
  background:#0b0c08;
  margin-top:8px;
  overflow:hidden;
  box-shadow:inset 0 0 0 2px rgba(214,192,154,.18);
}
.fill{
  height:100%;
  width:50%;
  background:var(--blood);
}
#hpFill{background:linear-gradient(90deg,#631719,#b83431)}
#stFill{background:linear-gradient(90deg,#50652f,#98ad58)}
.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.label{
  font-family:var(--font-pixel);
  font-size:9px;
  letter-spacing:0;
  line-height:1.55;
  text-transform:uppercase;
  color:var(--muted);
  text-shadow:var(--pixel-outline);
}
.value{
  margin-top:4px;
  font-family:var(--font-pixel);
  font-size:12px;
  font-weight:400;
  line-height:1.55;
  color:#f4dfac;
  text-shadow:var(--pixel-outline);
}
#roomPanel{
  padding:12px 14px;
  min-width:230px;
  max-width:285px;
  text-align:right;
  flex:1 1 230px;
}
#rightHud{
  display:grid;
  grid-template-columns:auto auto auto;
  align-items:flex-start;
  justify-content:flex-end;
  gap:12px;
  max-width:min(64vw,720px);
}
#roomPanel{
  grid-column:1 / -1;
  justify-self:end;
}
#xpPanel{
  grid-column:1;
  justify-self:end;
}
#extraAbilityPanel{
  grid-column:2;
  justify-self:end;
}
#abilityOrb{
  grid-column:3;
  justify-self:end;
}
#xpPanel{
  display:none;
  width:176px;
  padding:10px 12px;
  flex:0 0 176px;
}
#xpPanel.visible{
  display:block;
}
#xpPanel .bar{
  height:14px;
  margin-top:6px;
}
#xpFill{
  background:linear-gradient(90deg,#5f4c86,#d6ad55);
}
#xpPanel .value{
  font-size:10px;
}
#xpPanel.pulse{
  animation:panelPulse .75s steps(4,end);
}
@keyframes panelPulse{
  0%,100%{filter:brightness(1)}
  45%{filter:brightness(1.35)}
}
#abilityOrb{
  position:relative;
  width:var(--cooldown-orb-size);
  height:var(--cooldown-orb-size);
  --ability-ring:#d6ad55;
  --ability-glow:rgba(214,173,85,.38);
  --ability-core:rgba(143,31,36,.38);
  border:4px solid #17110d;
  border-radius:50%;
  overflow:hidden;
  flex:0 0 auto;
  padding:0;
  pointer-events:auto;
  cursor:pointer;
  isolation:isolate;
  outline:none;
  color:#fff0b5;
  background:
    radial-gradient(circle at 50% 34%,rgba(255,240,181,.26),transparent 28%),
    radial-gradient(circle at 50% 58%,var(--ability-core),transparent 46%),
    conic-gradient(from 45deg,#17110d 0 12.5%,#4f3821 0 25%,#17110d 0 37.5%,#6a4b26 0 50%,#17110d 0 62.5%,#3b2d1d 0 75%,#17110d 0 87.5%,#7b5a2f 0);
  box-shadow:
    0 0 0 2px rgba(239,226,196,.32),
    0 0 0 5px rgba(17,12,8,.78),
    0 10px 24px rgba(0,0,0,.34),
    inset 0 0 0 3px rgba(120,94,52,.68),
    inset 0 -18px 0 rgba(0,0,0,.18);
  image-rendering:pixelated;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:3px;
  transition:filter .12s ease, box-shadow .12s ease, transform .08s ease;
}
#abilityOrb::before,
#abilityOrb::after{
  content:"";
  position:absolute;
  pointer-events:none;
  border-radius:50%;
}
#abilityOrb::before{
  inset:-1px;
  z-index:2;
  border:2px solid rgba(255,240,181,.2);
  background:
    repeating-conic-gradient(from 0deg,rgba(255,240,181,.2) 0 7deg,transparent 7deg 18deg);
  opacity:.48;
}
#abilityOrb::after{
  inset:7px;
  z-index:1;
  border:2px solid rgba(23,17,13,.5);
  box-shadow:
    inset 0 0 0 2px rgba(255,245,212,.08),
    inset 0 8px 0 rgba(255,240,181,.08),
    inset 0 -10px 0 rgba(0,0,0,.2);
  opacity:.72;
}
#abilityOrb:hover{
  filter:brightness(1.08);
}
#abilityOrb:active{
  filter:brightness(1.2);
  transform:scale(.96);
}
#abilityOrb:focus-visible{
  box-shadow:
    0 0 0 2px rgba(255,240,181,.84),
    0 0 0 6px rgba(17,12,8,.82),
    0 0 20px var(--ability-glow),
    inset 0 0 0 3px rgba(150,101,40,.72),
    inset 0 -18px 0 rgba(0,0,0,.14);
}
#abilityOrb[data-class="rootbound"]{
  --ability-ring:#ffd879;
  --ability-glow:rgba(155,169,95,.5);
  --ability-core:rgba(82,96,50,.46);
}
#abilityOrb[data-class="frenzied"]{
  --ability-ring:#ffb07a;
  --ability-glow:rgba(201,76,56,.52);
  --ability-core:rgba(104,45,38,.5);
}
#abilityOrb[data-class="hollow"]{
  --ability-ring:#d9b7ff;
  --ability-glow:rgba(142,91,216,.5);
  --ability-core:rgba(53,37,66,.56);
}
#abilityOrb.ready{
  animation:abilityReadyPulse 1.05s steps(4,end) infinite;
  box-shadow:
    0 0 0 2px rgba(255,216,112,.72),
    0 0 0 5px rgba(17,12,8,.78),
    0 0 18px var(--ability-glow),
    0 0 34px rgba(255,240,181,.16),
    inset 0 0 0 3px rgba(150,101,40,.72),
    inset 0 -18px 0 rgba(0,0,0,.14);
}
#abilityOrb.ready::before{
  border-color:var(--ability-ring);
  opacity:.82;
  background:
    repeating-conic-gradient(from 0deg,var(--ability-ring) 0 8deg,transparent 8deg 18deg);
}
#abilityOrb.ready::after{
  border-color:rgba(255,240,181,.48);
  box-shadow:
    inset 0 0 0 2px rgba(255,245,212,.14),
    inset 0 8px 0 rgba(255,240,181,.13),
    inset 0 -10px 0 rgba(0,0,0,.15),
    0 0 18px var(--ability-glow);
}
#abilityOrb:not(.ready):not(.locked){
  filter:saturate(.86);
}
#abilityOrb:not(.ready):not(.locked)::before{
  border-color:rgba(216,236,178,.28);
  background:
    repeating-conic-gradient(from -28deg,rgba(216,236,178,.24) 0 5deg,transparent 5deg 17deg);
  opacity:.38;
}
#abilityOrb.locked{
  cursor:not-allowed;
  filter:saturate(.42) brightness(.86);
  opacity:.82;
}
#abilityOrb.locked::before{
  border-color:rgba(97,83,66,.5);
  background:
    repeating-conic-gradient(from 0deg,rgba(23,17,13,.54) 0 10deg,transparent 10deg 20deg);
  opacity:.7;
}
#abilityOrb.locked::after{
  inset:10px;
  border-color:rgba(23,17,13,.6);
  background:
    linear-gradient(45deg,transparent 42%,rgba(23,17,13,.72) 42% 58%,transparent 58%),
    linear-gradient(-45deg,transparent 42%,rgba(23,17,13,.72) 42% 58%,transparent 58%);
  opacity:.82;
}
#abilityOrb.locked #abilityFill{
  background:linear-gradient(180deg,rgba(80,72,62,.45),rgba(35,29,23,.75));
}
#abilityFill{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  z-index:0;
  height:0%;
  background:
    linear-gradient(180deg,rgba(111,63,200,.72),rgba(143,31,36,.66) 52%,rgba(214,173,85,.82)),
    repeating-linear-gradient(90deg,rgba(255,255,255,.16) 0 3px,transparent 3px 8px);
  transition:height .08s linear;
}
#abilityOrb[data-class="rootbound"] #abilityFill{
  background:
    linear-gradient(180deg,rgba(255,216,121,.82),rgba(155,169,95,.84) 52%,rgba(70,83,52,.9)),
    repeating-linear-gradient(90deg,rgba(255,255,255,.16) 0 3px,transparent 3px 8px);
}
#abilityOrb[data-class="frenzied"] #abilityFill{
  background:
    linear-gradient(180deg,rgba(255,176,122,.86),rgba(201,76,56,.82) 52%,rgba(104,45,38,.9)),
    repeating-linear-gradient(90deg,rgba(255,255,255,.16) 0 3px,transparent 3px 8px);
}
#abilityOrb[data-class="hollow"] #abilityFill{
  background:
    linear-gradient(180deg,rgba(217,183,255,.86),rgba(142,91,216,.78) 52%,rgba(53,37,66,.92)),
    repeating-linear-gradient(90deg,rgba(255,255,255,.16) 0 3px,transparent 3px 8px);
}
#abilityText,#abilityKey{
  position:relative;
  z-index:3;
  display:block;
  font-family:var(--font-pixel);
  font-weight:400;
  line-height:1.25;
  text-shadow:var(--pixel-outline);
}
#abilityText{
  max-width:72px;
  margin-top:0;
  font-size:6px;
  line-height:1.45;
  text-transform:uppercase;
  overflow:hidden;
  text-overflow:clip;
  overflow-wrap:anywhere;
}
#abilityKey{
  margin-top:0;
  font-size:12px;
  color:#d8ecb2;
  padding:2px 4px;
  min-width:24px;
  border:1px solid rgba(23,17,13,.72);
  background:rgba(23,17,13,.42);
  box-shadow:inset 0 0 0 1px rgba(255,245,212,.08);
}
#abilityOrb.ready #abilityKey{
  color:#fff0b5;
  border-color:rgba(255,240,181,.52);
  background:rgba(23,17,13,.34);
}
#abilityOrb.locked #abilityText,
#abilityOrb.locked #abilityKey{
  color:#9d9077;
}
#extraAbilityPanel{
  display:none;
  grid-template-columns:repeat(3,var(--cooldown-orb-size));
  gap:10px;
  padding:0;
  align-items:center;
  justify-items:center;
  background:transparent;
  border:0;
  box-shadow:none;
}
#extraAbilityPanel.visible{
  display:grid;
}
.extraAbilityBtn{
  position:relative;
  width:var(--cooldown-orb-size);
  height:var(--cooldown-orb-size);
  min-width:var(--cooldown-orb-size);
  min-height:var(--cooldown-orb-size);
  max-width:var(--cooldown-orb-size);
  max-height:var(--cooldown-orb-size);
  aspect-ratio:1 / 1;
  --mini-ring:#d6ad55;
  --mini-glow:rgba(214,173,85,.34);
  --mini-core:rgba(70,83,52,.46);
  --cooldown-fill:0%;
  border:3px solid #17110d;
  border-radius:50%;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 35%,rgba(255,240,181,.22),transparent 30%),
    radial-gradient(circle at 50% 60%,var(--mini-core),transparent 50%),
    conic-gradient(from 45deg,#17110d 0 12.5%,#4f3821 0 25%,#17110d 0 37.5%,#6a4b26 0 50%,#17110d 0 62.5%,#3b2d1d 0 75%,#17110d 0 87.5%,#7b5a2f 0);
  color:#fff0b5;
  font-family:var(--font-pixel);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1px;
  padding:0;
  text-align:center;
  text-transform:uppercase;
  cursor:pointer;
  isolation:isolate;
  box-shadow:
    0 0 0 2px rgba(239,226,196,.24),
    0 0 0 4px rgba(17,12,8,.68),
    0 8px 18px rgba(0,0,0,.28),
    inset 0 0 0 2px rgba(120,94,52,.58),
    inset 0 -12px 0 rgba(0,0,0,.18);
}
.extraAbilityBtn::before,
.extraAbilityBtn::after{
  content:"";
  position:absolute;
  pointer-events:none;
  border-radius:50%;
}
.extraAbilityBtn::before{
  left:0;
  right:0;
  bottom:0;
  height:var(--cooldown-fill);
  z-index:0;
  border-radius:0;
  background:
    linear-gradient(180deg,rgba(255,216,121,.78),var(--mini-ring)),
    repeating-linear-gradient(90deg,rgba(255,255,255,.16) 0 2px,transparent 2px 7px);
  transition:height .08s linear;
}
.extraAbilityBtn::after{
  inset:5px;
  z-index:1;
  border:2px solid rgba(23,17,13,.55);
  box-shadow:
    inset 0 0 0 2px rgba(255,245,212,.08),
    inset 0 6px 0 rgba(255,240,181,.08),
    inset 0 -8px 0 rgba(0,0,0,.2);
}
.extraAbilityBtn[data-class="rootbound"]{
  --mini-ring:#ffd879;
  --mini-glow:rgba(155,169,95,.46);
  --mini-core:rgba(82,96,50,.48);
}
.extraAbilityBtn[data-class="frenzied"]{
  --mini-ring:#ffb07a;
  --mini-glow:rgba(201,76,56,.48);
  --mini-core:rgba(104,45,38,.5);
}
.extraAbilityBtn[data-class="hollow"]{
  --mini-ring:#d9b7ff;
  --mini-glow:rgba(142,91,216,.48);
  --mini-core:rgba(53,37,66,.58);
}
.extraAbilityBtn.ready{
  box-shadow:
    0 0 0 2px rgba(255,216,112,.66),
    0 0 0 4px rgba(17,12,8,.7),
    0 0 16px var(--mini-glow),
    inset 0 0 0 2px rgba(150,101,40,.66),
    inset 0 -12px 0 rgba(0,0,0,.14);
  animation:abilityReadyPulse 1.05s steps(4,end) infinite;
}
.extraAbilityBtn.locked{
  cursor:not-allowed;
  filter:saturate(.45) brightness(.78);
  color:#9d9077;
}
.extraAbilityBtn > span{
  position:relative;
  z-index:3;
  text-shadow:var(--pixel-outline);
}
.extraAbilityKey{
  font-size:13px;
  line-height:1;
  color:#d8ecb2;
}
.extraAbilityName{
  max-width:72px;
  font-size:5.8px;
  line-height:1.2;
  overflow-wrap:anywhere;
}
.extraAbilityCd{
  font-size:6.5px;
  line-height:1;
  color:#d6ad55;
}
@keyframes abilityReadyPulse{
  0%,100%{filter:brightness(1)}
  50%{filter:brightness(1.16)}
}
#prompt{
  position:absolute;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  padding:13px 18px;
  max-width:min(88vw,720px);
  text-align:center;
  display:none;
  font-family:var(--font-pixel);
  font-size:11px;
  line-height:1.7;
  text-transform:uppercase;
  color:#f9e5a9;
}
#prompt.visible{display:block}
#prompt.promptCorpse{
  box-shadow:
    0 0 0 2px rgba(214,173,85,.45),
    0 0 0 5px rgba(17,12,8,.78),
    0 0 24px rgba(214,173,85,.2),
    inset 0 0 0 2px rgba(120,94,52,.55);
}
#prompt.promptPickup{
  color:#fff0b5;
  box-shadow:
    0 0 0 2px rgba(214,173,85,.62),
    0 0 0 5px rgba(17,12,8,.78),
    0 0 30px rgba(214,173,85,.26),
    inset 0 0 0 2px rgba(120,94,52,.55);
}
#prompt.promptExit{
  color:#d8ecb2;
}
#prompt.promptBlocked{
  color:#b9a98c;
  box-shadow:
    0 0 0 2px rgba(124,119,95,.4),
    0 0 0 5px rgba(17,12,8,.78),
    inset 0 0 0 2px rgba(81,71,54,.7);
}
#centerCard{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:min(94vw,1040px);
  max-height:calc(100svh - 24px);
  overflow:auto;
  pointer-events:auto;
  scrollbar-color:#7b5a2f rgba(23,17,13,.22);
  scrollbar-width:thin;
}
#centerCard.journalOpen{
  left:0;
  top:0;
  right:0;
  bottom:0;
  transform:none;
  width:auto;
  height:auto;
  max-height:none;
  overflow:hidden;
  padding:12px;
  box-sizing:border-box;
}
#centerCard.startOpen,
#centerCard.shopOpen{
  left:0;
  top:0;
  right:0;
  bottom:0;
  transform:none;
  width:auto;
  height:auto;
  max-height:none;
  overflow:hidden;
  padding:0;
  box-sizing:border-box;
}
.card{
  background:
    linear-gradient(180deg,rgba(214,192,154,.96),rgba(157,130,88,.96));
  color:#20160f;
  border:2px solid rgba(58,41,25,.8);
  border-radius:8px;
  padding:22px;
  box-shadow:0 26px 80px rgba(0,0,0,.55),inset 0 0 0 2px rgba(255,245,212,.18);
  max-width:100%;
}
.card h1,.card h2,.card h3{
  margin:0 0 10px;
  font-family:var(--font-pixel);
  font-weight:400;
  letter-spacing:0;
  line-height:1.45;
  color:#f6deb0;
  text-shadow:var(--pixel-outline);
}
.card p{
  margin:8px 0;
  font-family:var(--font-pixel);
  font-size:8px;
  line-height:1.72;
}
.titleCard{
  position:relative;
  overflow:hidden;
  min-height:100svh;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  border:0;
  border-radius:0;
  padding:clamp(18px,4vw,46px);
  background:
    linear-gradient(180deg,rgba(146,184,202,.94) 0 34%,rgba(176,184,126,.96) 34% 58%,rgba(87,91,62,.98) 58% 100%);
}
.titleCard h1{
  position:relative;
  z-index:2;
  font-size:clamp(20px,5vw,44px);
  margin-top:auto;
}
.titleCard p,.titleCard .buttons{
  position:relative;
  z-index:2;
  max-width:760px;
}
.titleRuins{
  position:absolute;
  inset:0;
  image-rendering:pixelated;
  pointer-events:none;
}
.titleSun{
  position:absolute;
  right:12%;

  .skillNodeCost{font-size:4.4px}
}
@media (pointer:coarse) and (max-height:480px){
  #stick{
    left:calc(18px + env(safe-area-inset-left));
    bottom:calc(18px + env(safe-area-inset-bottom));
    width:116px;
    height:116px;
  }
  #stickKnob{width:42px;height:42px}
  .touchButton{width:62px;height:62px;font-size:7px}
  #attackBtn{
    right:calc(18px + env(safe-area-inset-right));
    bottom:calc(20px + env(safe-area-inset-bottom));
    width:88px;
    height:88px;
    font-size:8px;
  }
  #jumpBtn{right:calc(116px + env(safe-area-inset-right));bottom:calc(24px + env(safe-area-inset-bottom))}
  #dodgeBtn{right:calc(78px + env(safe-area-inset-right));bottom:calc(98px + env(safe-area-inset-bottom))}
  #interactBtn{right:calc(184px + env(safe-area-inset-right));bottom:calc(24px + env(safe-area-inset-bottom))}
  #journalBtn{top:calc(72px + env(safe-area-inset-top));width:52px;height:52px;font-size:7px}
  #prompt{bottom:calc(128px + env(safe-area-inset-bottom));font-size:9px}
}
@media (max-height:620px) and (min-width:801px){
  #centerCard{
    max-height:calc(100svh - 18px);
  }
  .card{padding:18px}
  .classGrid{gap:10px;margin-top:12px}
  .classOption{min-height:154px}
  .classOption .classDesc{min-height:34px}
}
</style>
</head>
<body>
<div id="app">
  <canvas id="game" width="1280" height="720"></canvas>
</div>

<div id="hud">
  <div id="hudTop">
    <div id="vitals" class="journalPanel">
      <div class="row">
        <div>
          <div class="label">Health</div>
          <div class="value" id="hpText">100 / 100</div>
        </div>
        <div>
          <div class="label">Weapon</div>
          <div class="value" id="weaponText">Hunting Knife</div>
        </div>
      </div>
      <div class="bar"><div class="fill" id="hpFill"></div></div>
      <div class="bar"><div class="fill" id="stFill"></div></div>
    </div>
    <div id="rightHud">
      <div id="roomPanel" class="journalPanel">
        <div class="label">Journal</div>
        <div class="value" id="journalText">not found</div>
        <div class="label" style="margin-top:7px">Coins</div>
        <div class="value coinText" id="coinText">0</div>
        <div class="label" style="margin-top:7px">Room</div>
        <div class="value" id="roomText">Waking Stones</div>
      </div>
      <div id="xpPanel" class="journalPanel">
        <div class="row">
          <div class="label" id="levelText">LV 1</div>
          <div class="value" id="xpText">0 / 44</div>
        </div>
        <div class="bar"><div class="fill" id="xpFill"></div></div>
      </div>
      <div id="extraAbilityPanel" class="journalPanel" aria-label="Learned abilities">
        <button class="extraAbilityBtn locked" data-key="F" aria-label="F learned ability">
          <span class="extraAbilityKey">F</span>
          <span class="extraAbilityName">empty</span>
          <span class="extraAbilityCd">--</span>
        </button>
        <button class="extraAbilityBtn locked" data-key="T" aria-label="T learned ability">
          <span class="extraAbilityKey">T</span>
          <span class="extraAbilityName">empty</span>
          <span class="extraAbilityCd">--</span>
        </button>
        <button class="extraAbilityBtn locked" data-key="G" aria-label="G learned ability">
          <span class="extraAbilityKey">G</span>
          <span class="extraAbilityName">empty</span>
          <span class="extraAbilityCd">--</span>
        </button>
      </div>
      <button id="abilityOrb" aria-label="Class ability">
        <span id="abilityFill"></span>
        <span id="abilityText">Thorn</span>
        <span id="abilityKey">R</span>
      </button>
    </div>
  </div>
  <div id="prompt" class="journalPanel"></div>
</div>

<div id="overlay">
  <div id="centerCard"></div>
</div>

<div id="touchLayer">
  <div id="stick" class="touchControl"><div id="stickKnob"></div></div>
  <div id="attackBtn" class="touchControl">attack</div>
  <div id="jumpBtn" class="touchControl touchButton">jump</div>
  <div id="dodgeBtn" class="touchControl touchButton">roll</div>
  <div id="interactBtn" class="touchControl touchButton">use</div>
  <div id="journalBtn" class="touchControl">book</div>
</div>

<div id="rotateOverlay">
  <div class="card">
    <h2>Turn The Phone</h2>
    <p>random geame is built for landscape play so the side-scroller stays readable.</p>
  </div>
</div>

<script type="module" src="./bloodroot-citadel.mjs?v=86"></script>
<script>
if ("serviceWorker" in navigator) {
  addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(() => {});
  });
}
</script>
</body>
</html>
